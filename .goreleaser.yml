version: 2

project_name: gq

before:
  hooks:
    - go vet ./...

builds:
  - id: gq
    main: ./cmd/gq
    binary: gq
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: gq
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md
      - CLA.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  draft: false
  prerelease: auto
  mode: append
  replace_existing_artifacts: true
  header: |
    ## gq {{ .Tag }}
  footer: |
    **Install:**
    ```sh
    # via mise (pre-built binary):
    mise use --global github:Staffbase/gq@{{ .Tag }}

    # or download a tarball from the assets above and put `gq` on your PATH.
    ```
